version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: demo-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservices_network

  redis:
    image: redis:7-alpine
    container_name: demo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - microservices_network

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: demo-auth-service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/auth_db
      - JWT_SECRET=supersecretjwtkey_123!
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices_network

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: demo-product-service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/product_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices_network

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    container_name: demo-cart-service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/cart_db
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices_network

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: demo-order-service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/order_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices_network

  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
    container_name: demo-payment-service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/payment_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices_network

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: demo-notification-service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - NODE_ENV=production
    networks:
      - microservices_network

volumes:
  postgres_data:
  redis_data:

networks:
  microservices_network:
    name: microservices_network
